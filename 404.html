<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page non trouvée - Sohàn Bernier</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #faf7f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: #000;
      margin-bottom: 1rem;
      line-height: 0.9;
    }

    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      background: #000;
      color: #fff;
      padding: 12px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 5rem;
      }
      p {
        font-size: 0.9rem;
      }
      .btn {
        padding: 10px 28px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 3.5rem;
      }
      .container {
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Désolé, la page que vous recherchez n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
